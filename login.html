<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Bride's Palace</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY WITH FULL IMAGE */
body{
  font-family:'Segoe UI', sans-serif;
  height:100vh;
  background: url('low.jpeg') no-repeat center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

/* LOGIN BOX */
.login-box{
  position:relative;
  width:320px;
  padding:30px;
  background: rgba(255,255,255,0.2);
  border-radius:10px;
  text-align:center;
  z-index:1;
}

.login-box h2{
  margin-bottom:20px;
  color:#f5f5f5;
}

/* INPUT */
.input-box{
  margin-bottom:15px;
}

.input-box input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:5px;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#444;
}

/* LINKS */
.extra{
  margin-top:15px;
  font-size:14px;
  color: blue;
}

.extra a{
  display:block;
  text-decoration:none;
  color:#f6f6fa;
  margin-top:5px;
  text-decoration: underline;
}

.extra a:hover{
  color:#000;
  text-decoration:underline;
}

</style>
</head>

<body>

<div class="login-box">

  <h2>Fashion Designer Login</h2>

  <form>
    <div class="input-box">
      <input type="email" placeholder="Email" required>
    </div>

    <div class="input-box">
      <input type="password" placeholder="Password" required>
    </div>

   
    <form action="prime.html">
  <button type="submit">Login</button>
</form>
    <div class="extra">
      <a href="forgot.html">Forgot Password?</a>
      <a href="register.html">Create Account</a>
    </div>
  </form>

</div>

</body>
</html>
