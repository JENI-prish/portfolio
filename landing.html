<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bride's Palace</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* BODY */
body{
  font-family:'Segoe UI', sans-serif;
}

/* HERO SECTION */
.hero{
  height:100vh;
  background:url('co.png') no-repeat center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#fff;
  position:relative;
}

/* OVERLAY */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.hero-content{
  position:relative;
  z-index:1;
}

.hero h1{
  font-size:50px;
  margin-bottom:10px;
}

.hero p{
  font-size:18px;
  margin-bottom:20px;
}

.hero a{
  padding:10px 20px;
  background:#fff;
  color:#000;
  text-decoration:none;
  border-radius:5px;
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

.section h2{
  margin-bottom:20px;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card{
  width:180px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  overflow:hidden;
}

.card img{
  width:87%;
  height:200px;
  object-fit:cover;
}

.card h3{
  padding:10px;
}

.card p{
  padding:0 10px 10px;
  color:#555;
}

/* FOOTER */
.footer{
  background:#111;
  color:#fff;
  text-align:center;
  padding:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{
    font-size:30px;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Bride's Palace</h1>
    <p>Where Tradition Meets Style</p>
    <a href="index.html">Shop Now</a>
  </div>
</section>

<!-- COLLECTION -->
<section class="section">
  <h2>Our Collections</h2>

  <div class="cards">

    <div class="card">
      <img src="lel2.jpeg">
      <h3>Bridal Blouse</h3>
      <p>Elegant bridal designs</p>
    </div>

    <div class="card">
      <img src="images.jfif">
      <h3>Shimmer leggings</h3>
      <p>Premium materials</p>
    </div>

    <div class="card">
      <img src="po.webp">
      <h3>leggings</h3>
      <p>Traditional meterial</p>
    </div>

  </div>
</section>

<!-- FOOTER -->
<div class="footer">
  <p>© 2025 Bride's Palace</p>
</div>

</body>
</html>
