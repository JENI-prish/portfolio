<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>poster design</title>
    <style>
       body {
        margin: 0;
        font-family: 'Times New Roman', Times, serif;
}

    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 110%;
        background-image: url("go.jpg");
        background-size: cover;
    
        filter: blur(1px);
        z-index: -1;
    }

    body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        z-index: -1;
    }
        header {
            background-color: #f9fbfd;
            color: rgb(23, 19, 19);
            padding: 15px;
            margin-top: 20px;
            padding: 5px;
        }

        h1 {
            margin: 0;
            
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
  
        }

        .photo {
            background: white;
            margin: 50px;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 250px;
           
        }
        .photo1{
             background: white;
            margin: 50px;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            width: 280px;
            height: 200px;
        }
        .photo1 img{
            width: 100%;
            height: 150px;       /* landscape height */
            object-fit: cover;   /* crop pannum */
            border-radius: 5px;
        }
        .photo img {
            width: 100%;
            border-radius: 5px;

            
        }

        .caption {
            margin-top: 10px;
            font-weight: bold;
        }

        footer {
            background-color: #f9f2f2;
            color: rgb(6, 6, 6);
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Poster Designs</h1>
    <p>using canva</p>
  
</header>

<div class="gallery">

    <div class="photo">
        <img src="perfu.png" alt="Design 1">
        <div class="caption">Poster 1</div>
    </div>

    <div class="photo">
        <img src="SUMMER.png" alt="Design 2">
        <div class="caption">Poster 2</div>
    </div>

    <div class="photo">
        <img src="CHOCOLATE.png" alt="Design 3">
        <div class="caption">Poster 3</div>
    </div>
     <div class="photo">
        <img src="jeniprishkillah,kathrinekeona_III CSE-B_women who inspire us.png" alt="Design 4">
        <div class="caption">Poster 4</div>
    </div>
     <div class="photo">
        <img src="coffee poster.png" alt="Design 6">
        <div class="caption">Poster 4</div>
    </div>
     <div class="photo">
        <img src="ic play.png" alt="Design 5">
        <div class="caption">Poster 5</div>
    </div>
     <div class="photo1">
        <img src="watch.png" alt="Design 6">
        <div class="caption">Poster 6</div>
    </div>
   
</div>

<footer>
    <p>© 2026 Your Name</p>
</footer>

</body>
</html>
